<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradingEdge AI — Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Lightweight Charts (loaded before modules) -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="app">
    <!-- ═══ Header ═══ -->
    <header id="app-header"></header>

    <!-- ═══ Dashboard Grid ═══ -->
    <main id="dashboard">

      <!-- Watchlist -->
      <section id="panel-watchlist" class="panel">
        <div class="panel-header">
          <div class="panel-header-title">
            <span class="icon">📋</span>
            <span class="label">Watchlist</span>
          </div>
        </div>
        <div class="panel-body" id="watchlist-body"></div>
      </section>

      <!-- Chart -->
      <section id="panel-chart" class="panel">
        <div class="panel-header">
          <div class="panel-header-title">
            <span class="icon">📈</span>
            <span class="label" id="chart-title">AAPL — 1D</span>
          </div>
          <div class="panel-header-actions" id="chart-actions"></div>
        </div>
        <div class="panel-body" id="chart-body"></div>
      </section>

      <!-- Order Book -->
      <section id="panel-orderbook" class="panel">
        <div class="panel-header">
          <div class="panel-header-title">
            <span class="icon">📊</span>
            <span class="label">Order Book</span>
          </div>
          <div class="panel-header-actions" id="orderbook-actions"></div>
        </div>
        <div class="panel-body" id="orderbook-body"></div>
      </section>

      <!-- AI Signals -->
      <section id="panel-signals" class="panel">
        <div class="panel-header">
          <div class="panel-header-title">
            <span class="icon">🤖</span>
            <span class="label">AI Signals</span>
          </div>
          <div class="panel-header-actions" id="signals-actions"></div>
        </div>
        <div class="panel-body" id="signals-body"></div>
      </section>

      <!-- Portfolio -->
      <section id="panel-portfolio" class="panel">
        <div class="panel-header">
          <div class="panel-header-title">
            <span class="icon">💼</span>
            <span class="label">Portfolio</span>
          </div>
        </div>
        <div class="panel-body" id="portfolio-body"></div>
      </section>

    </main>
  </div>

  <!-- App Entry (ES Module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
